# =============================================================================
# General
# =============================================================================
set -g mouse on
set-window-option -g mode-keys vi

# =============================================================================
# Copy mode — vim keys
# =============================================================================
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi V   send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "~/.dotfiles/bin/tmux-clip"

# Overwrite selection file
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel \
  "~/.dotfiles/bin/tmux-capture overwrite"

# Append to selection file
bind -T copy-mode-vi A send-keys -X copy-pipe-and-cancel \
  "~/.dotfiles/bin/tmux-capture append"

# Mouse selection — just highlight, use Enter/A to save
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# =============================================================================
# Scroll
# =============================================================================
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 3 scroll-down

bind -T root WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
  { send-keys -M } { copy-mode -e }

# =============================================================================
# Pane navigation
# =============================================================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =============================================================================
# Capture full pane to file, @path to clipboard
# =============================================================================
bind P run-shell \
  "tmux capture-pane -p -S - > /tmp/tmux-pane.log && echo -n '@/tmp/tmux-pane.log' | ~/.dotfiles/bin/tmux-clip && tmux display-message 'Captured — @path in clipboard'"

# Clear selection file
bind C-p run-shell \
  "echo -n '' > /tmp/tmux-sel.log && tmux display-message 'tmux-sel.log cleared'"
